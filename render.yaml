services:
  - type: web
    name: cctns-ai-assistant
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: GROQ_API_KEY
        sync: false          # you'll paste this manually in Render dashboard
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: FLASK_DEBUG
        value: false
